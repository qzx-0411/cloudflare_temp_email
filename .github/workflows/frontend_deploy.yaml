name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FRONTEND_NAME: ${{ secrets.FRONTEND_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend
          echo "${{ secrets.FRONTEND_ENV }}" > .env.prod
          pnpm run build

      - name: Create Cloudflare Pages project if missing
        run: |
          npx wrangler pages project create "$FRONTEND_NAME" --production-branch=production || true

      - name: Deploy frontend to Cloudflare Pages
        run: |
          cd frontend
          npx wrangler pages deploy ./dist --project-name="$FRONTEND_NAME" --branch=production
